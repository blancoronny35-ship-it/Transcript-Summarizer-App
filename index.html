<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bytes Brain</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Manrope:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F9FF;
  --sf:#FFFFFF;
  --s2:#EAF6FF;
  --bd:#D9E6FF;
  --tx:#0B1B2B;
  --t2:#4C5A6A;
  --blue:#207AFF;
  --cyan:#00C0FF;
}

body{
  margin:0;
  font-family:'Manrope';
  background:var(--bg);
  color:var(--tx);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:white;
  border-bottom:1px solid var(--bd);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-box{
  width:34px;
  height:34px;
  border-radius:8px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:800;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--sf);
  border:1px solid var(--bd);
  border-radius:12px;
  padding:20px;
  margin-top:20px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--bd);
  background:var(--s2);
  margin-top:8px;
}

textarea{
  min-height:250px;
}

button{
  padding:10px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.primary{background:var(--blue);color:white;}
.secondary{background:var(--cyan);color:black;}
.ghost{background:white;border:1px solid var(--bd);}

.actions{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.output{
  white-space:pre-wrap;
  padding:12px;
  border:1px solid var(--bd);
  border-radius:8px;
  background:var(--s2);
  min-height:300px;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:var(--t2);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-box">BB</div>
    <div>
      <strong>BYTES BRAIN</strong><br>
      <small>Local Summary Engine</small>
    </div>
  </div>

  <button onclick="toggleTheme()" class="ghost">🌙 Theme</button>
</header>

<div class="container">

<div class="card">
<h3>⚙️ Configuración</h3>

<select id="language">
<option value="es">Español</option>
<option value="en">English</option>
</select>

<select id="template">
<option value="update">Update</option>
<option value="jira">Jira</option>
<option value="email">Email</option>
<option value="one">One-liner</option>
</select>

</div>

<div class="card">
<h3>📥 Input</h3>
<textarea id="inputText"></textarea>

<div class="actions">
<button class="primary" onclick="generate()">🚀 Generar</button>
<button class="ghost" onclick="clearAll()">🗑️ Limpiar</button>
</div>

<div id="status" class="status"></div>
</div>

<div class="card">
<h3>📤 Output</h3>
<div id="output" class="output"></div>

<div class="actions">
<button class="secondary" onclick="copy()">📋 Copiar</button>
<button class="ghost" onclick="save()">💾 Guardar</button>
</div>
</div>

<div class="card">
<h3>🗂️ Historial</h3>
<div id="history"></div>
<button class="ghost" onclick="clearHistory()">🧹 Limpiar</button>
</div>

</div>

<script>
function generate(){
let text=document.getElementById("inputText").value;
let lang=document.getElementById("language").value;

if(!text){
status("⚠️ Falta texto");
return;
}

let output=
`📢 Update

🟡 Estado
- En progreso

⚙️ Qué está pasando
- ${text.substring(0,120)}...

⚠️ Impacto
- Aún sin impacto definido

🧠 Próximo paso
- Dar seguimiento

⏳ Timeline
- Por definir`;

if(lang==="en"){
output=
`📢 Update

🟡 Status
- In progress

⚙️ What is happening
- ${text.substring(0,120)}...

⚠️ Impact
- Not defined yet

🧠 Next step
- Follow up

⏳ Timeline
- TBD`;
}

document.getElementById("output").innerText=output;
status("✅ Listo");
}

function status(msg){
document.getElementById("status").innerText=msg;
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").innerText);
status("📋 Copiado");
}

function clearAll(){
document.getElementById("inputText").value="";
document.getElementById("output").innerText="";
}

function save(){
let h=JSON.parse(localStorage.getItem("h")||"[]");
h.unshift(document.getElementById("output").innerText);
localStorage.setItem("h",JSON.stringify(h));
render();
}

function render(){
let h=JSON.parse(localStorage.getItem("h")||"[]");
let div=document.getElementById("history");
div.innerHTML="";
h.forEach(x=>{
let el=document.createElement("div");
el.innerText=x.substring(0,100)+"...";
el.onclick=()=>document.getElementById("output").innerText=x;
div.appendChild(el);
});
}

function clearHistory(){
localStorage.removeItem("h");
render();
}

function toggleTheme(){
document.body.classList.toggle("dark-mode");
}

render();
</script>

</body>
</html>
